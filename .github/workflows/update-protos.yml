name: Update WhatsApp Protos

on:
  schedule:
    # Run every Sunday at 01:00 UTC (before update-version which runs at 03:00 UTC)
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-protos:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3.6.0
        with:
          node-version: 20.x

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Fetch latest protos from WhatsApp Web
        working-directory: scripts
        run: node index.js

      - name: Generate JS from proto files
        working-directory: scripts
        run: node generate-proto.js

      - name: Generate TypeScript declarations
        working-directory: scripts
        run: |
          # Generate .d.ts files for each .js file in WAProto subdirectories
          for js_file in ../WAProto/*/*.js; do
            if [ -f "$js_file" ]; then
              ts_file="${js_file%.js}.d.ts"
              npx pbts -o "$ts_file" "$js_file" 2>/dev/null || echo "Skipped .d.ts for $(basename $js_file)"
            fi
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet -- WAProto/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request and Auto-Merge
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMP_BRANCH="update-protos/automation"
          BASE_BRANCH="main"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists to start fresh
          git push origin --delete "$TEMP_BRANCH" 2>/dev/null || true

          # Create new branch, commit, and push
          git checkout -b "$TEMP_BRANCH"
          git add WAProto/
          git commit -m "chore: update WhatsApp Web protobuf definitions"
          git push origin "$TEMP_BRANCH"

          # Create PR and capture the URL
          PR_URL=$(gh pr create \
            --title "chore: update WhatsApp Web protobuf definitions" \
            --body "Automated protobuf extraction from WhatsApp Web." \
            --base "$BASE_BRANCH" \
            --head "$TEMP_BRANCH")

          if [ -n "$PR_URL" ]; then
            echo "PR Created: $PR_URL"
            # Auto-merge the PR
            gh pr merge "$PR_URL" --merge --delete-branch
            echo "PR Merged successfully!"
          else
            echo "PR could not be created or already exists"
          fi
